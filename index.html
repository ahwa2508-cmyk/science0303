<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>달걀 시바의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'맑은 고딕',sans-serif;
}

body{
    background:linear-gradient(#dff7ff,#fff7db);
    overflow:hidden;
}

/* 제목 */
h1{
    text-align:center;
    font-size:60px;
    margin-top:25px;
    color:#7a4d00;
    text-shadow:3px 3px 8px rgba(0,0,0,.25);
}

/* 왼쪽 메뉴 */
.sidebar{
    position:fixed;
    top:120px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.sidebar a{
    width:130px;
    text-decoration:none;
    color:white;
    background:#ffb347;
    padding:13px;
    border-radius:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
}

.sidebar a:hover{
    background:#ff8c42;
    transform:translateX(10px);
}

/* 가운데 */
.main{
    height:calc(100vh - 100px);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 둥지 */
.nest{
    position:relative;
    width:650px;
    height:350px;
}

/* 둥지 */
.nest::before{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:520px;
    height:150px;
    border-radius:50%;
    background:
    repeating-radial-gradient(circle at center,
    #8b5a2b 0px,
    #8b5a2b 8px,
    #9c6a3c 8px,
    #9c6a3c 16px);
    box-shadow:0 20px 35px rgba(0,0,0,.25);
}

/* 시바 */
.shiba{
    position:absolute;
    left:50%;
    bottom:80px;
    transform:translateX(-50%);
    width:300px;
    z-index:2;
    transition:.3s;
}

.shiba:hover{
    transform:translateX(-50%) scale(1.08);
}
</style>
</head>

<body>

<h1>🥚 달걀 시바의 방입니다 🐕</h1>

<div class="sidebar">
<a href="#">1단원</a>
<a href="#">2단원</a>
<a href="#">3단원</a>
<a href="#">4단원</a>
<a href="#">5단원</a>
<a href="#">6단원</a>
<a href="#">7단원</a>
<a href="#">8단원</a>
</div>

<div class="main">
    <div class="nest">
        <img src="shiba.png" class="shiba">
    </div>
</div>

</body>
</html>
